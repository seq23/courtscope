name: Validate CourtScope

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: courtscope-validation-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install stable npm
        run: npm install --global npm@11

      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund

      - name: Run browserless release verification
        run: npm run verify
